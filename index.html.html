<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تطبيقاتADEL ABDULLAH </title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #0a0a0f;
    color: #f0f0f0;
    min-height: 100vh;
    direction: rtl;
  }
  header {
    text-align: center;
    padding: 60px 20px 40px;
    background: linear-gradient(180deg, #1a1a2e 0%, #0a0a0f 100%);
    border-bottom: 1px solid #ffffff12;
  }
  .dev-avatar {
    width: 88px; height: 88px; border-radius: 50%;
    background: linear-gradient(135deg, #007AFF, #5856D6);
    display: flex; align-items: center; justify-content: center;
    font-size: 36px; font-weight: 700; color: white;
    margin: 0 auto 16px;
  }
  header h1 { font-size: 28px; font-weight: 700; color: #fff; margin-bottom: 6px; }
  header p { font-size: 15px; color: #8e8e93; margin-bottom: 20px; }
  .store-badge {
    display: inline-flex; align-items: center; gap: 8px;
    background: #1c1c1e; border: 1px solid #3a3a3c; border-radius: 12px;
    padding: 10px 20px; color: #fff; text-decoration: none;
    font-size: 14px; font-weight: 500; transition: background 0.2s;
  }
  .store-badge:hover { background: #2c2c2e; }

  .stats {
    display: flex; justify-content: center; gap: 32px;
    padding: 24px 20px; border-bottom: 1px solid #ffffff10;
    background: #0d0d14;
  }
  .stat { text-align: center; }
  .stat-num { font-size: 22px; font-weight: 700; color: #fff; }
  .stat-lbl { font-size: 12px; color: #6e6e73; margin-top: 2px; }

  .filter-bar {
    display: flex; gap: 8px; padding: 16px 20px;
    overflow-x: auto; scrollbar-width: none; background: #0d0d14;
    border-bottom: 1px solid #ffffff10;
  }
  .filter-bar::-webkit-scrollbar { display: none; }
  .filter-btn {
    flex-shrink: 0; padding: 7px 16px; border-radius: 20px;
    border: 1px solid #3a3a3c; background: transparent;
    color: #8e8e93; font-size: 13px; cursor: pointer;
    transition: all 0.15s; white-space: nowrap;
  }
  .filter-btn.active { background: #007AFF; border-color: #007AFF; color: #fff; }
  .filter-btn:hover:not(.active) { background: #1c1c1e; color: #fff; }

  .section-title {
    font-size: 13px; font-weight: 600; color: #6e6e73;
    letter-spacing: 0.8px; padding: 20px 20px 10px;
  }

  #loading {
    text-align: center; padding: 60px 20px;
    color: #6e6e73; font-size: 15px;
  }
  .spinner {
    width: 32px; height: 32px;
    border: 3px solid #2c2c2e; border-top-color: #007AFF;
    border-radius: 50%; animation: spin 0.8s linear infinite;
    margin: 0 auto 16px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .apps-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 1px; background: #ffffff10;
    border-top: 1px solid #ffffff10;
    border-bottom: 1px solid #ffffff10;
  }
  .app-card {
    background: #0d0d14; padding: 14px 18px;
    display: flex; align-items: center; gap: 14px;
    text-decoration: none; color: inherit;
    transition: background 0.15s; cursor: pointer;
  }
  .app-card:hover { background: #141420; }
  .app-card.hidden { display: none; }

  .app-icon {
    width: 58px; height: 58px; border-radius: 13px;
    flex-shrink: 0; object-fit: cover; background: #1c1c1e;
  }
  .app-icon-placeholder {
    width: 58px; height: 58px; border-radius: 13px;
    flex-shrink: 0; background: #1c1c1e;
    display: flex; align-items: center; justify-content: center; font-size: 24px;
  }
  .app-info { flex: 1; min-width: 0; }
  .app-name {
    font-size: 14px; font-weight: 600; color: #fff;
    margin-bottom: 3px; white-space: nowrap;
    overflow: hidden; text-overflow: ellipsis;
  }
  .app-cat { font-size: 12px; color: #8e8e93; margin-bottom: 5px; }
  .app-badge {
    display: inline-block; font-size: 11px;
    padding: 2px 8px; border-radius: 6px; font-weight: 500;
  }
  .badge-game  { background: #1c2e4a; color: #5ac8fa; }
  .badge-biz   { background: #1a2e1a; color: #30d158; }
  .badge-ent   { background: #2e1c2e; color: #bf5af2; }
  .badge-race  { background: #2e2010; color: #ff9f0a; }
  .badge-photo { background: #1a1a2e; color: #a78bfa; }
  .badge-social{ background: #2e1a1a; color: #fb7185; }
  .badge-action{ background: #2e1010; color: #ff6b6b; }

  .arrow { color: #3a3a3c; font-size: 18px; flex-shrink: 0; }

  .no-results {
    text-align: center; padding: 40px 20px;
    color: #6e6e73; font-size: 14px; display: none;
  }

  footer {
    text-align: center; padding: 32px 20px;
    color: #3a3a3c; font-size: 13px;
  }
</style>
</head>
<body>

<header>
  <div class="dev-avatar">عا</div>
  <h1>عادل عبدالله</h1>
  <p>مطور تطبيقات iOS</p>
  <a class="store-badge" href="https://apps.apple.com/sa/developer/adel-abdullah/id390109349?l=ar" target="_blank">
    <svg width="16" height="16" viewBox="0 0 814 1000" fill="white"><path d="M788.1 340.9c-5.8 4.5-108.2 62.2-108.2 190.5 0 148.4 130.3 200.9 134.2 202.2-.6 3.2-20.7 71.9-68.7 141.9-42.8 61.6-87.5 123.1-155.5 123.1s-85.5-39.5-164-39.5c-76 0-103.7 40.8-165.9 40.8s-105-57.8-155.5-127.4C46 336.7 0 238.1 0 144.8 0 67.3 44.2 25.9 87.5 25.9c57.8 0 94.9 39.5 147.1 39.5 50.6 0 96.5-39.5 162.3-39.5 63.9 0 105.6 32.7 140 65 13.7-10.8 38-27.9 71.4-27.9 35.4 0 80.6 21.9 113.5 65z"/></svg>
    عرض على App Store
  </a>
</header>

<div class="stats">
  <div class="stat"><div class="stat-num" id="app-count">—</div><div class="stat-lbl">تطبيق</div></div>
  <div class="stat"><div class="stat-num">iOS</div><div class="stat-lbl">المنصة</div></div>
  <div class="stat"><div class="stat-num" id="genre-count">—</div><div class="stat-lbl">فئة</div></div>
</div>

<div class="filter-bar">
  <button class="filter-btn active" data-filter="all">الكل</button>
  <button class="filter-btn" data-filter="game">ألعاب</button>
  <button class="filter-btn" data-filter="race">سباق</button>
  <button class="filter-btn" data-filter="biz">أعمال</button>
  <button class="filter-btn" data-filter="photo">صور وفيديو</button>
  <button class="filter-btn" data-filter="ent">ترفيه</button>
  <button class="filter-btn" data-filter="social">اجتماعي</button>
  <button class="filter-btn" data-filter="action">أكشن</button>
</div>

<div class="section-title" id="section-label">جميع التطبيقات</div>
<div id="loading"><div class="spinner"></div>جاري تحميل التطبيقات...</div>
<div class="apps-grid" id="apps-grid" style="display:none;"></div>
<div class="no-results" id="no-results">لا توجد تطبيقات في هذه الفئة</div>

<footer>صُمّمت بـ ♥ — جميع التطبيقات متوفرة على App Store</footer>

<script>
const APP_IDS = [
  6480164729, 6479958519, 6449367336, 6448471436, 6447768971,
  1631220527, 1563843404, 1564197482, 1563854415, 1563974066,
  1549863629, 1037841527, 706747887,  562717546,  1068151452,
  1080252459, 570698587,  1144096773, 1038231116, 1511456692,
  1057661830, 737478400,  710386865,  1036032553, 938955998,
  1038235731, 942678413
];

function classify(genre) {
  if (!genre) return { key: 'game', badge: 'badge-game', label: 'تطبيق' };
  const g = genre.toLowerCase();
  if (g.includes('racing'))                         return { key: 'race',   badge: 'badge-race',   label: 'سباق' };
  if (g.includes('game') || g.includes('simulation') || g.includes('casual') || g.includes('action') && g.includes('game'))
                                                    return { key: 'game',   badge: 'badge-game',   label: 'ألعاب' };
  if (g.includes('action'))                         return { key: 'action', badge: 'badge-action', label: 'أكشن' };
  if (g.includes('photo') || g.includes('video'))  return { key: 'photo',  badge: 'badge-photo',  label: 'صور وفيديو' };
  if (g.includes('social'))                         return { key: 'social', badge: 'badge-social', label: 'اجتماعي' };
  if (g.includes('entertainment'))                  return { key: 'ent',    badge: 'badge-ent',    label: 'ترفيه' };
  if (g.includes('business') || g.includes('productivity') || g.includes('utilities'))
                                                    return { key: 'biz',    badge: 'badge-biz',    label: 'أعمال' };
  return { key: 'biz', badge: 'badge-biz', label: genre };
}

async function loadApps() {
  const grid   = document.getElementById('apps-grid');
  const loading = document.getElementById('loading');
  try {
    const url  = 'https://itunes.apple.com/lookup?id=' + APP_IDS.join(',') + '&country=sa';
    const res  = await fetch(url);
    const data = await res.json();
    const apps = data.results.filter(r => r.wrapperType === 'software');

    const genres = new Set();
    document.getElementById('app-count').textContent = apps.length;

    apps.forEach(app => {
      const icon  = app.artworkUrl100 || '';
      const name  = app.trackName || 'تطبيق';
      const genre = app.primaryGenreName || '';
      const link  = app.trackViewUrl || '#';
      const cls   = classify(genre);
      genres.add(cls.key);

      const card = document.createElement('a');
      card.className = 'app-card';
      card.href = link;
      card.target = '_blank';
      card.dataset.filter = cls.key;
      card.innerHTML = `
        ${icon
          ? `<img class="app-icon" src="${icon}" alt="${name}" onerror="this.outerHTML='<div class=\\'app-icon-placeholder\\'>📱</div>'">`
          : `<div class="app-icon-placeholder">📱</div>`}
        <div class="app-info">
          <div class="app-name">${name}</div>
          <div class="app-cat">${genre}</div>
          <span class="app-badge ${cls.badge}">${cls.label}</span>
        </div>
        <span class="arrow">›</span>
      `;
      grid.appendChild(card);
    });

    document.getElementById('genre-count').textContent = genres.size;
    loading.style.display = 'none';
    grid.style.display = 'grid';
    setupFilters();
  } catch(e) {
    loading.innerHTML = '<p style="color:#ff453a;padding:40px">تعذّر تحميل التطبيقات. تحقق من اتصالك.</p>';
  }
}

function setupFilters() {
  const btns  = document.querySelectorAll('.filter-btn');
  const cards = document.querySelectorAll('.app-card');
  const label = document.getElementById('section-label');
  const none  = document.getElementById('no-results');

  btns.forEach(btn => {
    btn.addEventListener('click', () => {
      btns.forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      const f = btn.dataset.filter;
      let count = 0;
      cards.forEach(c => {
        const show = f === 'all' || c.dataset.filter === f;
        c.classList.toggle('hidden', !show);
        if (show) count++;
      });
      label.textContent = f === 'all' ? 'جميع التطبيقات' : btn.textContent;
      none.style.display = count === 0 ? 'block' : 'none';
    });
  });
}

loadApps();
</script>
</body>
</html>
